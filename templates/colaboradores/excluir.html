{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Excluir Colaborador
</h2>

<div class="alert alert-danger">

    Deseja realmente excluir
    <strong>{{ colaborador.nome }}</strong>?

</div>

<form method="POST">

    {% csrf_token %}

    <button type="submit" class="btn btn-danger">
        Confirmar Exclusão
    </button>

    <a href="/" class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
