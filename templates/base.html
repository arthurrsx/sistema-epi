<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema EPI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            margin:0;
            padding:0;
            background:#f4f6f9;
        }

        .sidebar{
            width:250px;
            height:100vh;
            background:#212529;
            position:fixed;
            left:0;
            top:0;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:12px;
            margin-bottom:10px;
            border-radius:8px;
        }

        .sidebar a:hover{
            background:#0d6efd;
        }

        .content{
            margin-left:270px;
            padding:30px;
        }

        .topbar{
            background:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;

            display:flex;
            justify-content:space-between;
            align-items:center;

            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .user-info{
            display:flex;
            align-items:center;
            gap:10px;
        }

        .user-info img{
            width:45px;
            height:45px;
            border-radius:50%;
        }

        .card-custom{
            background:white;
            border-radius:15px;
            padding:20px;

            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

    <div class="sidebar">

        <h2>Sistema EPI</h2>

        <a href="{% url 'listar_colaboradores' %}">Colaboradores</a>

        <a href="/equipamentos/">Equipamentos</a>

        <a href="{% url 'listar_emprestimos' %}">Empréstimos</a>        

        <a href="#">Relatórios</a>

    </div>

    <div class="content">

        <div class="topbar">

            <h4>Painel Administrativo</h4>

            <div class="user-info">

                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

                <span>Administrador</span>

            </div>

        </div>

        <div class="card-custom">

            {% block content %}

            {% endblock %}

        </div>

    </div>

</body>

</html>
