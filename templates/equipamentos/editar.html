{% extends 'base.html' %}

{% block content %}

<style>
.container-form {
    max-width: 700px;
    margin: 40px auto;
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.08);
}

.container-form h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

.form-row {
    display: flex;
    gap: 15px;
}

.form-group {
    margin-bottom: 15px;
    flex: 1;
}

label {
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
}

input,
textarea,
select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.2s;
}

input:focus,
textarea:focus,
select:focus {
    border-color: #198754;
    box-shadow: 0 0 5px rgba(25,135,84,0.2);
}

textarea {
    min-height: 100px;
    resize: vertical;
}

.btn-area {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
        gap: 0;
    }
}
</style>

<div class="container-form">

    <h2>Editar Equipamento</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label for="{{ form.nome_epi.id_for_label }}">
                Nome do Equipamento
            </label>
            {{ form.nome_epi }}
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="{{ form.ca.id_for_label }}">
                    CA
                </label>
                {{ form.ca }}
            </div>

            <div class="form-group">
                <label for="{{ form.quantidade.id_for_label }}">
                    Quantidade
                </label>
                {{ form.quantidade }}
            </div>

        </div>

        <div class="form-group">
            <label for="{{ form.validade.id_for_label }}">
                Validade
            </label>
            {{ form.validade }}
        </div>

        <div class="form-group">
            <label for="{{ form.descricao.id_for_label }}">
                Descrição (opcional)
            </label>
            {{ form.descricao }}
        </div>

        <div class="btn-area">

            <button type="submit" class="btn btn-warning">
                Atualizar
            </button>

            <a href="{% url 'listar_equipamentos' %}"
               class="btn btn-secondary">
                Voltar
            </a>

        </div>

    </form>

</div>

{% endblock %}
