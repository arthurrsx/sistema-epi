{% extends 'base.html' %}

{% block content %}

<h2>Cadastrar Equipamento</h2>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-success">
        Salvar
    </button>

    <a href="{% url 'listar_equipamentos' %}" class="btn btn-secondary">
        Voltar
    </a>
</form>

{% endblock %}
